<!DOCTYPE html>
<html>
<head>
    <title>WorkNest Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        input, select {
            display: block;
            margin: 8px 0;
            padding: 6px;
            width: 250px;
        }

        button {
            padding: 6px 12px;
            margin-top: 5px;
            cursor: pointer;
        }

        #forms-list, #employees-list {
            margin-top: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>WorkNest Dashboard</h1>

<button onclick="logout()">Logout</button>

<hr>

<!-- ================= PROFILE INFO ================= -->
<div class="section">
    <h2>User Info</h2>
    <div id="user-info"></div>
</div>

<hr>

<!-- ================= FORM BUILDER ================= -->
<div class="section">
    <h2>Create New Form</h2>

    <input type="text" id="form_name" placeholder="Form Name">
    <button onclick="createForm()">Create Form</button>

    <div id="forms-list"></div>
</div>

<hr>

<!-- ================= EMPLOYEE SECTION ================= -->
<div class="section">
    <h2>Employees</h2>
    <div id="employees-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    const API_BASE = "/api/v1";
    const token = localStorage.getItem("access");

    // Protect Dashboard
    if (!token) {
        window.location.href = "/";
    }

    // Attach token automatically
    axios.defaults.headers.common["Authorization"] = "Bearer " + token;

    // Load profile on page load
    window.onload = function() {
        loadProfile();
        loadForms();
    };

    // ================= USER PROFILE =================
    function loadProfile() {
        axios.get(API_BASE + "/accounts/profile/")
        .then(response => {
            document.getElementById("user-info").innerText =
                "Logged in as: " + response.data.username;
        })
        .catch(error => {
            console.log(error);
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/";
    }

    // ================= FORM CREATION =================
    function createForm() {
        const name = document.getElementById("form_name").value;

        axios.post(API_BASE + "/forms/create/", {
            name: name
        })
        .then(response => {
            alert("Form created successfully");
            document.getElementById("form_name").value = "";
            loadForms();
        })
        .catch(error => {
            console.log(error.response.data);
        });
    }

    // Load existing forms
    function loadForms() {
        axios.get(API_BASE + "/forms/create/")
        .then(response => {
            const formsList = document.getElementById("forms-list");
            formsList.innerHTML = "";

            response.data.forEach(form => {
                formsList.innerHTML += `
                    <div class="card">
                        <strong>${form.name}</strong>
                        <br>
                        Created At: ${form.created_at}
                    </div>
                `;
            });
        })
        .catch(error => {
            console.log(error);
        });
    }

</script>

</body>
</html>
