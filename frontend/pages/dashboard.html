<!DOCTYPE html>
<html>
<head>
    <title>WorkNest Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        input, select {
            display: block;
            margin: 8px 0;
            padding: 6px;
            width: 250px;
        }

        button {
            padding: 6px 12px;
            margin-top: 5px;
            cursor: pointer;
        }

        #forms-list, #employees-list {
            margin-top: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>WorkNest Dashboard</h1>

<button onclick="logout()">Logout</button>

<hr>

<!-- ================= PROFILE INFO ================= -->
<div class="section">
    <h2>User Info</h2>
    <div id="user-info"></div>
</div>

<hr>

<!-- ================= FORM BUILDER ================= -->
<div class="section">
    <h2>Create New Form</h2>

    <input type="text" id="form_name" placeholder="Form Name">
    <button onclick="createForm()">Create Form</button>

    <div id="forms-list"></div>
</div>

<!-- Field Builder Section  -->
<hr>

<div class="section">
    <h2>Form Field Builder</h2>

    <select id="form_select"></select>

    <input type="text" id="field_label" placeholder="Field Label">

    <select id="field_type">
        <option value="text">Text</option>
        <option value="number">Number</option>
        <option value="date">Date</option>
        <option value="password">Password</option>
        <option value="email">Email</option>
    </select>

    <label>
        <input type="checkbox" id="field_required" checked>
        Required
    </label>

    <input type="number" id="field_order" placeholder="Order">

    <button onclick="addField()">Add Field</button>

    <div id="fields-list"></div>
</div>

<hr>

<!-- ================= EMPLOYEE SECTION ================= -->
<div class="section">
    <h2>Employees</h2>
    <div id="employees-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    // ================= CONFIG =================
    const API_BASE = "/api/v1";
    const token = localStorage.getItem("access");

    // Protect Dashboard
    if (!token) {
        window.location.href = "/";
    }

    // Attach token automatically
    axios.defaults.headers.common["Authorization"] = "Bearer " + token;

    // ================= FUNCTIONS =================

    // ================= USER PROFILE =================
    function loadProfile() {
        axios.get(API_BASE + "/accounts/profile/")
        .then(response => {
            document.getElementById("user-info").innerText =
                "Logged in as: " + response.data.username;
        })
        .catch(error => {
            console.log(error);
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/";
    }

    // ================= FORM CREATION =================
    function createForm() {
        const name = document.getElementById("form_name").value;

        axios.post(API_BASE + "/forms/create/", {
            name: name
        })
        .then(response => {
            alert("Form created successfully");
            document.getElementById("form_name").value = "";
            loadForms();
        })
        .catch(error => {
            console.log(error.response.data);
        });
    }

    // Load existing forms
    function loadForms() {
        axios.get(API_BASE + "/forms/create/")
        .then(response => {
            const formsList = document.getElementById("forms-list");
            const formSelect = document.getElementById("form_select");
            
            formsList.innerHTML = "";
            formSelect.innerHTML = "";

            response.data.forEach(form => {
                formsList.innerHTML += `
                    <div class="card">
                        <strong>${form.name}</strong>
                        <br>
                        Created At: ${form.created_at}
                    </div>
                `;
                formSelect.innerHTML += `
                    <option value="${form.id}">
                        ${form.name}
                    </option>
                `;
            });
            if (response.data.length > 0) {
                loadFields(response.data[0].id);
            }
        })
        .catch(error => {
            console.log(error);
        });
    }

    // Add Field Function
    function addField() {
        const formId = document.getElementById("form_select").value;

        axios.post(API_BASE + `/forms/${formId}/fields/`, {
            label: document.getElementById("field_label").value,
            field_type: document.getElementById("field_type").value,
            required: document.getElementById("field_required").checked,
            order: document.getElementById("field_order").value
        })
        .then(response => {
            alert("Field added");
            loadFields(formId);
        })
        .catch(error => console.log(error.response.data));
    }

    // Load fields for selected form
    function loadFields(formId) {
        axios.get(API_BASE + `/forms/${formId}/fields/`)
        .then(response => {
            const fieldsList = document.getElementById("fields-list");
            fieldsList.innerHTML = "";

            response.data.forEach(field => {
                fieldsList.innerHTML += `
                    <div class="card">
                        <strong>${field.label}</strong>
                        (${field.field_type})
                        - Order: ${field.order}
                    </div>
                `;
            });
        })
        .catch(error => console.log(error));
    }

    // ================= PAGE LOAD =================
    document.addEventListener("DOMContentLoaded", function() {
        loadProfile();
        loadForms();

        document.getElementById("form_select")
            .addEventListener("change", function() {
                loadFields(this.value);
            });
    });
    

</script>

</body>
</html>
